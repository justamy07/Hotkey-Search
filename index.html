<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortcut Finder - 快捷鍵搜尋器</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            'primary-hover': '#1D4ED8',
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    kbd {
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body class="bg-white text-gray-900 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-50 h-[64px] border-b border-gray-200 bg-white/80 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/80 px-6 flex items-center justify-between">
    <div class="flex items-center gap-2 font-bold text-xl">
      <i data-lucide="keyboard" class="w-6 h-6 text-primary"></i>
      <span>Shortcut Finder</span>
    </div>
    <div class="flex items-center gap-4">
      <!-- 系統切換 Mac / Windows -->
      <button id="platform-toggle" class="px-3 py-1.5 text-xs font-semibold rounded-lg border border-gray-300 dark:border-slate-700 bg-gray-50 dark:bg-slate-800 hover:bg-gray-100 dark:hover:bg-slate-700 transition">
        <span id="platform-text">macOS</span>
      </button>
      <!-- Dark Mode Toggle -->
      <button id="theme-toggle" class="p-2 rounded-lg border border-gray-200 dark:border-slate-800 hover:bg-gray-100 dark:hover:bg-slate-800 transition" aria-label="Toggle Theme">
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
      </button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Search Area -->
    <div class="relative max-w-[720px] mx-auto mb-6">
      <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
      <input 
        type="text" 
        id="search-input"
        placeholder="搜尋功能、工具、快捷鍵..." 
        class="w-full h-[48px] pl-12 pr-28 rounded-xl border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-base shadow-sm focus:outline-none focus:border-primary dark:focus:border-primary transition"
      />
      <span id="results-count" class="absolute right-4 top-1/2 -translate-y-1/2 text-xs text-gray-400">
        0 Results
      </span>
    </div>

    <!-- Software Tabs -->
    <div class="flex justify-center gap-2 mb-4 flex-wrap" id="software-tabs">
      <button data-software="photoshop" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-primary text-white">Photoshop</button>
      <button data-software="illustrator" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700">Illustrator</button>
      <button data-software="figma" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700">Figma</button>
      <button data-software="word" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700">Word</button>
      <button data-software="vscode" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700">VS Code</button>
      <button data-software="premiere" class="tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700">Premiere Pro</button>
    </div>

    <!-- Category Filter (預設選中 Popular) -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-1 scrollbar-none justify-start md:justify-center" id="category-filters">
      <button data-category="all" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800">All</button>
      <button data-category="popular" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition bg-gray-900 text-white dark:bg-slate-100 dark:text-slate-900">Popular (Top 6)</button>
      <button data-category="tool" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800">Tool</button>
      <button data-category="edit" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800">Edit</button>
      <button data-category="layer" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800">Layer</button>
      <button data-category="selection" class="cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800">Selection</button>
    </div>

    <!-- Cards Grid (更緊湊的網格佈局) -->
    <div id="cards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-12">
      <i data-lucide="search-x" class="w-10 h-10 mx-auto text-gray-400 mb-3"></i>
      <h3 class="text-base font-semibold mb-1">找不到符合的快捷鍵</h3>
      <p class="text-xs text-gray-500">請試試其他關鍵字</p>
    </div>
  </main>

  <script>
    // 擴充內建快捷鍵資料庫
    const shortcutsData = [
      // Photoshop
      { id: 1, software: "photoshop", category: "tool", name: "Move Tool", zh: "移動工具", shortcutMac: "V", shortcutWindows: "V", description: "移動圖層或選取內容。", keywords: ["move", "tool", "移動", "箭頭"], popularity: 100 },
      { id: 2, software: "photoshop", category: "tool", name: "Brush Tool", zh: "筆刷工具", shortcutMac: "B", shortcutWindows: "B", description: "切換至筆刷工具進行塗鴉。", keywords: ["brush", "paint", "筆刷", "畫筆"], popularity: 98 },
      { id: 3, software: "photoshop", category: "layer", name: "New Layer", zh: "新增圖層", shortcutMac: "⌘ Shift N", shortcutWindows: "Ctrl Shift N", description: "建立一個新的空白圖層。", keywords: ["layer", "new", "圖層", "新增"], popularity: 96 },
      { id: 4, software: "photoshop", category: "edit", name: "Undo", zh: "復原", shortcutMac: "⌘ Z", shortcutWindows: "Ctrl Z", description: "復原上一步動作。", keywords: ["undo", "z", "復原", "上一步"], popularity: 99 },
      { id: 5, software: "photoshop", category: "selection", name: "Deselect", zh: "取消選取", shortcutMac: "⌘ D", shortcutWindows: "Ctrl D", description: "取消目前的選取範圍。", keywords: ["deselect", "cancel", "選取", "取消"], popularity: 95 },
      { id: 6, software: "photoshop", category: "edit", name: "Free Transform", zh: "自由變形", shortcutMac: "⌘ T", shortcutWindows: "Ctrl T", description: "縮放、旋轉或傾斜圖層物件。", keywords: ["transform", "scale", "變形", "縮放"], popularity: 97 },
      { id: 7, software: "photoshop", category: "tool", name: "Marquee Tool", zh: "矩形選取工具", shortcutMac: "M", shortcutWindows: "M", description: "繪製矩形或橢圓選取區。", keywords: ["marquee", "select", "矩形", "選取"], popularity: 85 },
      { id: 8, software: "photoshop", category: "tool", name: "Lasso Tool", zh: "套索工具", shortcutMac: "L", shortcutWindows: "L", description: "徒手繪製不規則選取區。", keywords: ["lasso", "select", "套索"], popularity: 82 },
      { id: 9, software: "photoshop", category: "layer", name: "Duplicate Layer", zh: "複製圖層", shortcutMac: "⌘ J", shortcutWindows: "Ctrl J", description: "重製目前的圖層或選區。", keywords: ["duplicate", "copy", "複製", "圖層"], popularity: 92 },

      // Figma
      { id: 2001, software: "figma", category: "tool", name: "Frame Tool", zh: "框架工具", shortcutMac: "F", shortcutWindows: "F", description: "建立新的 Frame 畫板。", keywords: ["frame", "artboard", "框架", "畫板"], popularity: 100 },
      { id: 2002, software: "figma", category: "edit", name: "Auto Layout", zh: "自動布局", shortcutMac: "Shift A", shortcutWindows: "Shift A", description: "將選取元件加入 Auto Layout。", keywords: ["auto", "layout", "自動布局", "排版"], popularity: 98 },
      { id: 2003, software: "figma", category: "edit", name: "Create Component", zh: "建立元件", shortcutMac: "⌥ ⌘ K", shortcutWindows: "Ctrl Alt K", description: "將選取的物件轉換為 Component。", keywords: ["component", "元件"], popularity: 94 },
      { id: 2004, software: "figma", category: "tool", name: "Pen Tool", zh: "鋼筆工具", shortcutMac: "P", shortcutWindows: "P", description: "繪製自訂向量路徑。", keywords: ["pen", "vector", "鋼筆", "向量"], popularity: 90 },
      { id: 2005, software: "figma", category: "layer", name: "Group Selection", zh: "群組物件", shortcutMac: "⌘ G", shortcutWindows: "Ctrl G", description: "將選取的物件群組化。", keywords: ["group", "群組"], popularity: 96 },
      { id: 2006, software: "figma", category: "tool", name: "Text Tool", zh: "文字工具", shortcutMac: "T", shortcutWindows: "T", description: "建立文字方塊輸入文字。", keywords: ["text", "font", "文字"], popularity: 95 },

      // Illustrator
      { id: 1001, software: "illustrator", category: "tool", name: "Pen Tool", zh: "鋼筆工具", shortcutMac: "P", shortcutWindows: "P", description: "繪製貝茲曲線與路徑。", keywords: ["pen", "path", "鋼筆", "路徑"], popularity: 100 },
      { id: 1002, software: "illustrator", category: "tool", name: "Direct Selection", zh: "直接選取工具", shortcutMac: "A", shortcutWindows: "A", description: "選取與調整錨點或控制桿。", keywords: ["direct", "anchor", "白箭頭", "錨點"], popularity: 96 },
      { id: 1003, software: "illustrator", category: "tool", name: "Selection Tool", zh: "選取工具", shortcutMac: "V", shortcutWindows: "V", description: "選取、移動與變形整體物件。", keywords: ["selection", "black", "黑箭頭"], popularity: 98 },
      { id: 1004, software: "illustrator", category: "edit", name: "Create Outlines", zh: "轉建立外框", shortcutMac: "⌘ Shift O", shortcutWindows: "Ctrl Shift O", description: "將文字轉換為向量路徑。", keywords: ["outline", "text", "外框", "轉曲"], popularity: 92 },
      { id: 1005, software: "illustrator", category: "tool", name: "Shape Builder", zh: "形狀建立工具", shortcutMac: "Shift M", shortcutWindows: "Shift M", description: "直覺地合併或扣除相交形狀。", keywords: ["shape", "builder", "形狀"], popularity: 94 },
      { id: 1006, software: "illustrator", category: "layer", name: "Make Clipping Mask", zh: "製作剪裁遮罩", shortcutMac: "⌘ 7", shortcutWindows: "Ctrl 7", description: "使用最上層物件遮罩下方內容。", keywords: ["mask", "clip", "遮罩"], popularity: 91 },

      // Word
      { id: 3001, software: "word", category: "edit", name: "Copy Format", zh: "複製格式", shortcutMac: "⌘ Shift C", shortcutWindows: "Ctrl Shift C", description: "複製選取文字的格式設定。", keywords: ["format", "copy", "複製", "格式"], popularity: 95 },
      { id: 3002, software: "word", category: "edit", name: "Paste Format", zh: "貼上格式", shortcutMac: "⌘ Shift V", shortcutWindows: "Ctrl Shift V", description: "套用已複製的格式設定。", keywords: ["format", "paste", "貼上"], popularity: 94 },
      { id: 3003, software: "word", category: "edit", name: "Find & Replace", zh: "尋找與取代", shortcutMac: "⌘ H", shortcutWindows: "Ctrl H", description: "快速尋找與批次取代文字。", keywords: ["find", "replace", "尋找", "取代"], popularity: 96 },
      { id: 3004, software: "word", category: "edit", name: "Bold Text", zh: "粗體字", shortcutMac: "⌘ B", shortcutWindows: "Ctrl B", description: "切換字型粗體樣式。", keywords: ["bold", "粗體"], popularity: 100 },
      { id: 3005, software: "word", category: "edit", name: "Line Break", zh: "換行不換段", shortcutMac: "Shift Enter", shortcutWindows: "Shift Enter", description: "插入分行符號而不建立新段落。", keywords: ["break", "enter", "換行"], popularity: 90 },
      { id: 3006, software: "word", category: "edit", name: "Center Align", zh: "置中對齊", shortcutMac: "⌘ E", shortcutWindows: "Ctrl E", description: "將段落文字置中對齊。", keywords: ["align", "center", "置中"], popularity: 88 },

      // VS Code
      { id: 4001, software: "vscode", category: "edit", name: "Command Palette", zh: "命令面板", shortcutMac: "⌘ Shift P", shortcutWindows: "Ctrl Shift P", description: "開啟命令選單執行各項指令。", keywords: ["command", "palette", "命令"], popularity: 100 },
      { id: 4002, software: "vscode", category: "edit", name: "Quick Open", zh: "快速開啟檔案", shortcutMac: "⌘ P", shortcutWindows: "Ctrl P", description: "輸入檔名快速跳轉至檔案。", keywords: ["open", "file", "檔案"], popularity: 98 },
      { id: 4003, software: "vscode", category: "edit", name: "Toggle Comment", zh: "切換註解", shortcutMac: "⌘ /", shortcutWindows: "Ctrl /", description: "快速將單行或多行程式碼註解。", keywords: ["comment", "註解"], popularity: 96 },
      { id: 4004, software: "vscode", category: "edit", name: "Multi-Cursor", zh: "新增游標", shortcutMac: "⌥ Click", shortcutWindows: "Alt Click", description: "在多個位置同時插入游標。", keywords: ["cursor", "multi", "游標"], popularity: 92 },
      { id: 4005, software: "vscode", category: "edit", name: "Format Document", zh: "格式化文件", shortcutMac: "⇧ ⌥ F", shortcutWindows: "Shift Alt F", description: "依設定自動排版整份程式碼。", keywords: ["format", "code", "排版"], popularity: 95 },
      { id: 4006, software: "vscode", category: "edit", name: "Duplicate Line", zh: "向下複製一行", shortcutMac: "⇧ ⌥ ↓", shortcutWindows: "Shift Alt ↓", description: "迅速複製目前行至下一行。", keywords: ["duplicate", "line", "複製"], popularity: 91 },

      // Premiere Pro
      { id: 5001, software: "premiere", category: "tool", name: "Razor Tool", zh: "剪切工具", shortcutMac: "C", shortcutWindows: "C", description: "在時間軸上裁切剪輯片段。", keywords: ["razor", "cut", "剪切", "刀片"], popularity: 100 },
      { id: 5002, software: "premiere", category: "tool", name: "Selection Tool", zh: "選取工具", shortcutMac: "V", shortcutWindows: "V", description: "標準選取與移動片段工具。", keywords: ["select", "move", "選取"], popularity: 98 },
      { id: 5003, software: "premiere", category: "edit", name: "Ripple Delete", zh: "波紋刪除", shortcutMac: "⌥ Delete", shortcutWindows: "Shift Delete", description: "刪除片段並自動消除空隙。", keywords: ["ripple", "delete", "波紋", "刪除"], popularity: 96 },
      { id: 5004, software: "premiere", category: "edit", name: "Add Edit", zh: "新增剪輯點", shortcutMac: "⌘ K", shortcutWindows: "Ctrl K", description: "在播放頭位置切斷所有軌道。", keywords: ["cut", "edit", "切斷"], popularity: 94 },
      { id: 5005, software: "premiere", category: "tool", name: "Track Select Forward", zh: "向前軌道選取", shortcutMac: "A", shortcutWindows: "A", description: "選取指定位置後方所有片段。", keywords: ["track", "select", "軌道"], popularity: 90 },
      { id: 5006, software: "premiere", category: "edit", name: "Zoom In/Out", zh: "時間軸縮放", shortcutMac: "= / -", shortcutWindows: "= / -", description: "放大或縮小時間軸顯示。", keywords: ["zoom", "timeline", "縮放"], popularity: 92 }
    ];

    // State (預設 category 設為 'popular')
    let currentSoftware = 'photoshop';
    let currentCategory = 'popular';
    let searchQuery = '';
    let currentPlatform = localStorage.getItem('platform') || 'mac';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    // Theme Setup
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }

    // Elements
    const searchInput = document.getElementById('search-input');
    const cardsGrid = document.getElementById('cards-grid');
    const emptyState = document.getElementById('empty-state');
    const resultsCount = document.getElementById('results-count');
    const platformText = document.getElementById('platform-text');

    // Filter & Render Function
    function render() {
      const q = searchQuery.trim().toLowerCase();

      let filtered = shortcutsData.filter(item => {
        if (item.software !== currentSoftware) return false;

        if (!q) {
          if (currentCategory === 'popular') return item.popularity >= 90;
          if (currentCategory !== 'all') return item.category === currentCategory;
          return true;
        }
        
        return item.name.toLowerCase().includes(q) ||
               item.zh.includes(q) ||
               item.shortcutMac.toLowerCase().includes(q) ||
               item.shortcutWindows.toLowerCase().includes(q) ||
               item.description.toLowerCase().includes(q) ||
               item.keywords.some(k => k.toLowerCase().includes(q));
      }).sort((a, b) => b.popularity - a.popularity);

      // 當選擇 Popular 且沒有搜尋字詞時，嚴格僅顯示前 6 個項目
      if (currentCategory === 'popular' && !q) {
        filtered = filtered.slice(0, 6);
      }

      resultsCount.textContent = `${filtered.length} Results`;

      if (filtered.length === 0) {
        cardsGrid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      cardsGrid.innerHTML = filtered.map(item => {
        const isFav = favorites.includes(item.id);
        const keysStr = currentPlatform === 'mac' ? item.shortcutMac : item.shortcutWindows;
        const keys = keysStr.split(' ');

        return `
          <div class="group relative flex flex-col justify-between rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:shadow-md dark:border-slate-800 dark:bg-slate-800">
            <div>
              <div class="flex items-center justify-between gap-2">
                <span class="rounded-md bg-gray-100 px-2 py-0.5 text-[10px] font-semibold text-gray-500 uppercase tracking-wider dark:bg-slate-700 dark:text-slate-300">
                  ${item.category}
                </span>
                <button onclick="toggleFavorite(${item.id})" class="p-1 text-gray-400 hover:text-yellow-400 transition" aria-label="Favorite">
                  <i data-lucide="star" class="w-4 h-4 ${isFav ? 'fill-yellow-400 text-yellow-400' : ''}"></i>
                </button>
              </div>
              
              <!-- 重點文字：中文名稱與關鍵資訊放大提升視覺焦點 -->
              <div class="mt-2">
                <h3 class="text-xl font-bold text-gray-900 dark:text-slate-100 leading-snug">${item.zh}</h3>
                <p class="text-xs font-semibold text-gray-400 dark:text-slate-400 mt-0.5">${item.name}</p>
              </div>
              <p class="mt-1.5 text-xs text-gray-500 dark:text-slate-400 line-clamp-2 leading-relaxed">${item.description}</p>
            </div>

            <!-- 重點文字放大：快捷鍵 <kbd> 放大呈現 -->
            <div class="mt-4 flex flex-wrap items-center gap-1.5 pt-3 border-t border-gray-100 dark:border-slate-700/60">
              ${keys.map(k => `<kbd class="min-w-[36px] text-center inline-block rounded-lg border border-gray-300 bg-gray-50 px-2.5 py-1 text-lg font-extrabold font-mono text-primary dark:border-slate-600 dark:bg-slate-900 dark:text-blue-400">${k}</kbd>`).join('')}
            </div>
          </div>
        `;
      }).join('');

      lucide.createIcons();
    }

    // Toggle Favorite
    window.toggleFavorite = function(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(fId => fId !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('favorites', JSON.stringify(favorites));
      render();
    };

    // Event Listeners
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById('software-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-300 hover:bg-gray-200 dark:hover:bg-slate-700';
      });
      btn.className = 'tab-btn px-4 py-2 rounded-full text-xs font-semibold transition bg-primary text-white';
      currentSoftware = btn.dataset.software;
      render();
    });

    document.getElementById('category-filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = 'cat-btn px-3 py-1 rounded-lg text-xs font-medium transition text-gray-600 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-800';
      });
      btn.className = 'cat-btn px-3 py-1 rounded-lg text-xs font-medium transition bg-gray-900 text-white dark:bg-slate-100 dark:text-slate-900';
      currentCategory = btn.dataset.category;
      render();
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    document.getElementById('platform-toggle').addEventListener('click', () => {
      currentPlatform = currentPlatform === 'mac' ? 'windows' : 'mac';
      platformText.textContent = currentPlatform === 'mac' ? 'macOS' : 'Windows';
      localStorage.setItem('platform', currentPlatform);
      render();
    });

    // Keyboard Shortcuts (ESC to clear search)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        searchQuery = '';
        render();
      }
    });

    // Initial Init
    platformText.textContent = currentPlatform === 'mac' ? 'macOS' : 'Windows';
    render();
  </script>
</body>
