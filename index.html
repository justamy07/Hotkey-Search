    const searchInput = document.getElementById('search-input');
    const cardsGrid = document.getElementById('cards-grid');
    const emptyState = document.getElementById('empty-state');
    const resultsCount = document.getElementById('results-count');
    const platformText = document.getElementById('platform-text');

    // Cyber Rendering Core
    function render() {
      const q = searchQuery.trim().toLowerCase();

      let filtered = shortcutsData.filter(item => {
        if (item.software !== currentSoftware) return false;

        if (!q) {
          if (currentCategory === 'popular') return item.popularity >= 90;
          if (currentCategory !== 'all') return item.category === currentCategory;
          return true;
        }
        
        return item.name.toLowerCase().includes(q) ||
               item.zh.includes(q) ||
               item.shortcutMac.toLowerCase().includes(q) ||
               item.shortcutWindows.toLowerCase().includes(q) ||
               item.description.toLowerCase().includes(q) ||
               item.keywords.some(k => k.toLowerCase().includes(q));
      }).sort((a, b) => b.popularity - a.popularity);

      // Homepage default limit: 6 Most Popular Cards
      if (currentCategory === 'popular' && !q) {
        filtered = filtered.slice(0, 6);
      }

      resultsCount.textContent = filtered.length;

      if (filtered.length === 0) {
        cardsGrid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      cardsGrid.innerHTML = filtered.map((item, index) => {
        const isFav = favorites.includes(item.id);
        const keysStr = currentPlatform === 'mac' ? item.shortcutMac : item.shortcutWindows;
        const keys = keysStr.split(' ');

        return `
          <div class="group relative flex flex-col justify-between clip-cyber border border-neon-cyan/30 bg-neon-card/90 p-3.5 transition-all duration-300 hover:border-neon-cyan hover:shadow-[0_0_15px_rgba(0,240,255,0.25)] hover:-translate-y-0.5">
            
            <!-- Cyberpunk Top Bar Info -->
            <div>
              <div class="flex items-center justify-between gap-2 border-b border-neon-cyan/10 pb-2 mb-2">
                <span class="px-1.5 py-0.5 text-[9px] font-bold text-neon-yellow bg-neon-yellow/10 border border-neon-yellow/30 uppercase tracking-widest clip-tag">
                  [${item.category}]
                </span>
                <div class="flex items-center gap-2">
                  <span class="text-[9px] text-neon-cyan/40 font-mono">ID:${String(item.id).padStart(4, '0')}</span>
                  <button onclick="toggleFavorite(${item.id})" class="p-1 text-neon-cyan/40 hover:text-neon-yellow transition" aria-label="Favorite">
                    <i data-lucide="star" class="w-3.5 h-3.5 ${isFav ? 'fill-neon-yellow text-neon-yellow drop-shadow-[0_0_5px_#ffe600]' : ''}"></i>
                  </button>
                </div>
              </div>
              
              <!-- Prominent Enlarged Header Text -->
              <div>
                <h3 class="text-xl font-black text-white tracking-wide chromatic-text leading-tight">${item.zh}</h3>
                <p class="text-xs font-bold text-neon-cyan/80 font-mono mt-0.5 uppercase tracking-wider">${item.name}</p>
              </div>

              <!-- Brief Description -->
              <p class="mt-1.5 text-[11px] text-slate-400 font-mono leading-relaxed line-clamp-2">${item.description}</p>
            </div>

            <!-- Highly Highlighted Enlarged Keyboard Shortcuts -->
            <div class="mt-3 pt-2.5 border-t border-neon-cyan/20 flex flex-wrap items-center gap-1.5">
              ${keys.map(k => `<kbd class="neon-kbd px-2.5 py-0.5 text-base font-black font-mono clip-tag tracking-wider">${k}</kbd>`).join('')}
            </div>
            
            <!-- Decorative Accent Bar -->
            <div class="absolute bottom-0 right-0 w-3 h-3 border-r-2 border-b-2 border-neon-magenta/60"></div>
          </div>
        `;
      }).join('');

      lucide.createIcons();
    }

    // Toggle Favorite Logic
    window.toggleFavorite = function(id) {
      if (favorites.includes(id)) {
        favorites = favorites.filter(fId => fId !== id);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('cyber_favorites', JSON.stringify(favorites));
      render();
    };

    // Event Bindings
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById('software-tabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.className = 'tab-btn px-3 sm:px-4 py-1.5 clip-cyber text-xs font-bold tracking-wider uppercase transition border border-neon-cyan/40 bg-black/60 text-neon-cyan hover:border-neon-cyan hover:bg-neon-cyan/10';
      });
      btn.className = 'tab-btn px-3 sm:px-4 py-1.5 clip-cyber text-xs font-bold tracking-wider uppercase transition border border-neon-cyan bg-neon-cyan text-black shadow-[0_0_10px_rgba(0,240,255,0.6)]';
      currentSoftware = btn.dataset.software;
      render();
    });

    document.getElementById('category-filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.className = 'cat-btn px-3 py-1 clip-tag text-xs font-bold uppercase transition border border-neon-magenta/40 text-neon-magenta/70 hover:text-neon-magenta hover:border-neon-magenta';
      });
      btn.className = 'cat-btn px-3 py-1 clip-tag text-xs font-bold uppercase transition border border-neon-magenta bg-neon-magenta text-black shadow-[0_0_8px_rgba(255,0,85,0.6)]';
      currentCategory = btn.dataset.category;
      render();
    });

    document.getElementById('platform-toggle').addEventListener('click', () => {
      currentPlatform = currentPlatform === 'mac' ? 'windows' : 'mac';
      platformText.textContent = `OS: ${currentPlatform === 'mac' ? 'macOS' : 'WIN'}`;
      localStorage.setItem('cyber_platform', currentPlatform);
      render();
    });

    // Keyboard ESC Shortcut to Reset Search
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        searchQuery = '';
        render();
      }
    });

    // Initial Execution
    platformText.textContent = `OS: ${currentPlatform === 'mac' ? 'macOS' : 'WIN'}`;
    render();
  </script>
</body>
</html>
